<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Page</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/swiper-bundle.min.css">
</head>

<body>

<header>
    <div class="nav container">

        <a href="index.html" class="logo">
            Game <span>Store</span>
        </a>

        <div class="nav-icons">

            <i class="bx bx-bell bx-tada" id="bell-icon"></i>
            <i class="bx bx-download"></i>

            <div class="menu-icon">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>

            <!-- NOTIFICAÇÃO -->
            <div class="notification">

                <div class="notification-box">
                    <i class="bx bxs-check-circle"></i>
                    <p>Congratulations, your game downloaded successfully.</p>
                </div>

                <div class="notification-box error-box">
                    <i class="bx bxs-x-circle"></i>
                    <p>Could not apply changes.</p>
                </div>

            </div>

        </div>
    </div>
</header>

<!-- VIDEO -->
<video controls autoplay muted loop>
  <source src="download-files/video.mp4">
</video>

<!-- COPYRIGHT -->
<div class="copyright container">
    <a href="#" class="logo">game<span>Store</span></a>
    <p>&#169; Macedo</p>
</div>

</body>
</html>
