<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Macedo Store</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0d1a;
    font-family:Arial;
    color:white;
}

/* CARD */
.login-box{
    width:320px;
    padding:30px;
    border-radius:15px;
    background:#1b182b;
    box-shadow:0 0 20px rgba(250,83,83,0.4);
    text-align:center;
}

/* TÍTULO */
.login-box h2{
    margin-bottom:20px;
    color:#fa5353;
}

/* INPUTS */
.login-box input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
    background:#322f40;
    color:white;
}

/* BOTÃO LOGIN */
.login-box button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#fa5353;
    color:white;
    transition:0.3s;
}

.login-box button:hover{
    background:#d94343;
    transform:scale(1.03);
}

/* BOTÃO CADASTRO */
.cadastro-btn{
    background:transparent;
    border:1px solid #fa5353;
    margin-top:10px;
}

.cadastro-btn:hover{
    background:#fa5353;
}

/* TEXTO PEQUENO */
small{
    display:block;
    margin-top:10px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="login-box">

    <h2> Macedo Login</h2>

    <input id="user" placeholder="E-mail do Usuário">
    <input id="pass" type="password" placeholder="Senha">
    
    <button id="btn-entrar">Entrar</button>
    <button class="cadastro-btn" id="btn-mostrar-cadastro">Não tenho login</button>
    <small>Entre para acessar o site</small>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script type="module">
    import { auth } from "./js/firebase-config.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const btnEntrar = document.getElementById('btn-entrar');
    const inputUser = document.getElementById('user');
    const inputPass = document.getElementById('pass');

    btnEntrar.addEventListener('click', () => {
        const email = inputUser.value;
        const password = inputPass.value;

        if (!email || !password) {
            alert('Por favor, preencha todos os campos.');
            return;
        }

        // Faz o login no Firebase
        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // AQUI ESTÁ O SEGREDO: Salva que o usuário logou com sucesso
                sessionStorage.setItem("logado", "true");
                
                // Agora sim, manda ele para a página principal
                window.location.href = "index.html";
            })
            .catch((error) => {
                console.error("Erro ao logar:", error.message);
                alert("Erro ao fazer login. Verifique seu e-mail e senha.");
            });
    });

    // Botão de cadastro (caso queira redirecionar depois para uma tela de registro)
    document.getElementById('btn-mostrar-cadastro').addEventListener('click', () => {
        alert('Funcionalidade de cadastro pode ser inserida aqui ou redirecionar para cadastro.html');
    });
</script>

</body>
</html>
