<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0d1a;
    font-family:Arial;
    color:white;
}

.box{
    width:320px;
    padding:30px;
    border-radius:15px;
    background:#1b182b;
    text-align:center;
    box-shadow:0 0 20px rgba(250,83,83,0.4);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#322f40;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#fa5353;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#d94343;
}
</style>
</head>

<body>

<div class="box">
    <h2>Criar Conta</h2>

    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button>Cadastrar</button>  
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script type="module" src="js/firebase-config.js"></script>
<script type="module">
    // 1. Importamos as funções necessárias do Firebase Auth v9+/v10+
    import { auth } from "./js/firebase-config.js";
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 2. Criamos a função para cadastrar o usuário
    function criar() {
        const email = document.getElementById("user").value;
        const pass = document.getElementById("pass").value;

        if (!email || !pass) {
            alert("Preencha todos os campos!");
            return;
        }

        // Usando a sintaxe modular moderna do Firebase
        createUserWithEmailAndPassword(auth, email, pass)
            .then((userCredential) => {
                alert("Conta criada com sucesso!");
                window.location.href = "login.html";
            })
            .catch((error) => {
                alert("Erro ao criar conta: " + error.message);
            });
    }

    // 3. Como o 'onclick' direto no HTML não funciona com módulos, 
    // nós adicionamos o evento de clique diretamente aqui pelo JavaScript!
    document.querySelector("button").addEventListener("click", criar);
</script>

</body>
</html>
